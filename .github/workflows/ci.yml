# ─────────────────────────────────────────────────────────────────────────────
# CodeMap — Continuous Integration
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to main and every pull request. Installs the project,
# runs ruff (lint + format check), and runs the pytest suite. Failures here
# block merges and surface a red badge in the README.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push comes in. Saves runner
# minutes and keeps the status fresh.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Check formatting with ruff
        run: ruff format --check src tests

      - name: Run tests with pytest
        run: pytest -ra

